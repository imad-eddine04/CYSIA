<!DOCTYPE html>
<html>
<head>
    <title>Global Bank | Analysis Result</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f7f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .result-card { background: white; padding: 50px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; max-width: 400px; }
        .status-icon { font-size: 60px; margin-bottom: 20px; }
        .btn-home { display: inline-block; margin-top: 30px; padding: 12px 25px; background: #1a237e; color: white; text-decoration: none; border-radius: 8px; font-weight: 600; transition: 0.3s; }
        .btn-home:hover { opacity: 0.9; }
        .safe { color: #2e7d32; }
        .risky { color: #c62828; }
    </style>
</head>
<body>
    <div class="result-card">
        {% if data == 0 %}
            <div class="status-icon">✅</div>
            <h1 class="safe">Loan Approved</h1>
            <p>Our AI analysis indicates a <strong>Low Risk</strong> profile. You are eligible for this loan.</p>
        {% else %}
            <div class="status-icon">⚠️</div>
            <h1 class="risky">Application Flagged</h1>
            <p>Our AI analysis indicates a <strong>High Risk</strong> of default. Further manual review is required.</p>
        {% endif %}
        <a href="/" class="btn-home">New Analysis</a>
    </div>
</body>
</html>
